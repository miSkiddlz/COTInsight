<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COT Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="/static/charts.js" defer></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #0f172a;
    color: #e5e7eb;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

.controls {
    margin-bottom: 20px;
}

label {
    margin-right: 10px;
}

select {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
    font-size: 14px;
    outline: none;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

#chartDiv {
    width: 100%;
    height: 600px;
}
</style>

</head>
<body>

<div class="container">
    <h1>COT Dashboard</h1>

    <div class="controls">
        <label>Asset:</label>
        <select id="assetSelect"></select>
    </div>

    <div class="card">
        <div id="chartDiv"></div>
    </div>
</div>

</body>
</html>
