<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>COT Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="/static/charts.js" defer></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #0f172a;
    color: #e5e7eb;
    margin: 0;
}

.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

h1 {
    font-size: 28px;
    margin-bottom: 5px;
}

.subtitle {
    color: #9ca3af;
    margin-bottom: 20px;
}

.controls {
    margin-bottom: 20px;
}

select {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

/* KPI */
.kpi-row {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.kpi {
    flex: 1;
    background: #111827;
    padding: 15px;
    border-radius: 12px;
}

.kpi-title {
    font-size: 12px;
    color: #9ca3af;
}

.kpi-main {
    display: flex;
    align-items: center;
    gap: 10px;
}

.kpi-value {
    font-size: 20px;
    font-weight: bold;
}

.kpi-change {
    font-size: 13px;
    opacity: 0.9;
}

/* Chart */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 16px;
}

/* Footer */
.footer-bar {
    margin-top: 20px;
    padding: 15px;
    background: #111827;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #9ca3af;
}

.footer-bar a {
    color: #3b82f6;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

    <h1>COT Dashboard</h1>
    <p class="subtitle">Commitment of Traders Positioning Tool</p>

    <div class="controls">
        <label>Asset:</label>
        <select id="assetSelect"></select>
    </div>

    <!-- KPI -->
    <div class="kpi-row">

        <div class="kpi">
            <div class="kpi-title">Commercials</div>
            <div class="kpi-main">
                <div class="kpi-value" id="kpiComm">-</div>
                <div class="kpi-change" id="kpiCommChange"></div>
            </div>
        </div>

        <div class="kpi">
            <div class="kpi-title">Non-Commercials</div>
            <div class="kpi-main">
                <div class="kpi-value" id="kpiNonComm">-</div>
                <div class="kpi-change" id="kpiNonCommChange"></div>
            </div>
        </div>

        <div class="kpi">
            <div class="kpi-title">Retail</div>
            <div class="kpi-main">
                <div class="kpi-value" id="kpiRetail">-</div>
                <div class="kpi-change" id="kpiRetailChange"></div>
            </div>
        </div>

    </div>

    <!-- Chart -->
    <div class="card">
        <div id="chartDiv" style="width:100%;height:600px;"></div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
        <a href="https://www.cftc.gov/MarketReports/CommitmentsofTraders/index.htm" target="_blank">
            Latest COT Report
        </a>

        <span>Last Update: <span id="lastUpdate">-</span></span>
    </div>

</div>

</body>
</html>
