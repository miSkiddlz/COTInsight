<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COTInsight Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        select {
            padding: 5px 10px;
            font-size: 16px;
        }
        #chart {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            height: 600px;
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>COTInsight Dashboard</h1>

    <div class="controls">
        <label>
            Asset: 
            <select id="assetSelect"></select>
        </label>
        <label>
            Trader Type: 
            <select id="traderSelect"></select>
        </label>
    </div>

    <div id="chart"></div>

    <script src="/static/charts.js"></script>
</body>
</html>
